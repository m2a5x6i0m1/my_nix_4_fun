################
### MONITORS ###
################

monitor=eDP-1,1366x768@60,0x0,1.0


#################
### AUTOSTART ###
#################

exec-once = waybar 
exec-once = hyprsunset -t 4000
exec-once = hypridle 
exec-once = swaync 
# exec-once = syncthing --no-browser
# exec-once = waypaper --random

### clipboard ###
exec-once = wl-clipboard-history -t
exec-once = wl-paste --watch cliphist store
exec-once = wl-clip-persist --clipboard regular --display wayland-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

### polkit ###
exec-once = systemctl --user start hyprpolkitagent

#####################
### LOOK AND FEEL ###
#####################

general {
  gaps_in = 1
  gaps_out = 2
  border_size = 1

  col.inactive_border = rgba(595959aa)

  no_focus_fallback = true
  resize_on_border = true
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 2

  dim_inactive = true
  dim_strength = 0.1

  blur {
    enabled = false
  }

  shadow {
    enabled = false
  }
}

animations {
  enabled = true
  first_launch_animation = false

  bezier = easeOutQuint,0.23,1,0.32,1
  bezier = easeInOutCubic,0.65,0.05,0.36,1
  bezier = linear,0,0,1,1
  bezier = almostLinear,0.5,0.5,0.75,1.0
  bezier = quick,0.15,0,0.1,1

  animation = global, 1, 10, default
  animation = border, 1, 5.39, easeOutQuint
  animation = windows, 1, 4.79, easeOutQuint
  animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
  animation = windowsOut, 1, 1.49, linear, popin 87%
  animation = fadeIn, 1, 1.73, almostLinear
  animation = fadeOut, 1, 1.46, almostLinear
  animation = fade, 1, 3.03, quick
  animation = layers, 1, 3.81, easeOutQuint
  animation = layersIn, 1, 4, easeOutQuint, fade
  animation = layersOut, 1, 1.5, linear, fade
  animation = fadeLayersIn, 1, 1.79, almostLinear
  animation = fadeLayersOut, 1, 1.39, almostLinear
  animation = workspaces, 1, 1.94, almostLinear, fade
  animation = workspacesIn, 1, 1.21, almostLinear, fade
  animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
  preserve_split = true
  force_split = 1
}

xwayland {
  enabled = true
  force_zero_scaling = true
}

misc {
  new_window_takes_over_fullscreen = 1
  initial_workspace_tracking = 2
  focus_on_activate = false
}

binds {
  workspace_center_on = 1
  disable_keybind_grabbing = false
}

cursor {
  hide_on_key_press = true
}


#############
### INPUT ###
#############

input {
  kb_layout = us,ru
  kb_options = grp:win_space_toggle, caps:swapescape
  follow_mouse = 1

  sensitivity = 0
  accel_profile = flat
  touchpad {
    natural_scroll = false
    clickfinger_behavior = false
    tap-to-click = true
    tap-and-drag = false
  }
}
device {
  name = elan1200:00-04f3:3067-touchpad
  enabled = 1
  accel_profile = adaptive
  sensitivity = -0.1
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod SHIFT, M, exec, hyprlock
bind = $mainMod SHIFT, code:127, exec, systemctl suspend
bind = $mainMod SHIFT, code:115, exec, systemctl poweroff
bind = $mainMod, C, killactive,

bind = $mainMod, Q, exec, kitty
bind = $mainMod, B, exec, firefox
bind = $mainMod, R, exec, wofi --show drun

bind = $mainMod, T, exec, telegram-desktop
bind = $mainMod, W, exec, blueman-manager
bind = $mainMod, V, exec, pwvucontrol

bind = $mainMod, U, fullscreen
bind = $mainMod, Y, togglefloating
bind = $mainMod, Y, centerwindow 
bind = $mainMod, code:34, swapsplit
bind = $mainMod, code:35, togglesplit

### clipboard ###
bind = $mainMod, I, exec, cliphist list | wofi --dmenu --width=850 | cliphist decode | wl-copy

### toggle-touchpad ###
bind = $mainMod, code:135, exec, ~/.config/hypr/toggle-touchpad.sh elan1200:00-04f3:3067-touchpad

### reload waybar ###
bind = $mainMod SHIFT, W, exec, killall -SIGUSR2 waybar

### screenshots ###
bind = , PRINT, exec, hyprshot -m region
bind = $mainMod, PRINT, exec, hyprshot -m window  
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m output

###move around ###
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + arrowkeys
bind = $mainMod, code:114, workspace, e+1
bind = $mainMod, code:113, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps. You'll probably like this.
windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
