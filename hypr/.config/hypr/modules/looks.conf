general {
  gaps_in = 1
  gaps_out = 2
  border_size = 1

  col.inactive_border = rgba(595959aa)

  no_focus_fallback = true
  resize_on_border = true
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 2

  dim_inactive = true
  dim_strength = 0.1

  blur {
    enabled = false
  }

  shadow {
    enabled = false
  }
}

